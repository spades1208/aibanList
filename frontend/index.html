<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aiBanlist Elite — 高效戰術分析版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jQuery & Select2 -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <link rel="stylesheet" href="./style.css" />
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .swal2-popup { background: #0f172a !important; color: white !important; border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem !important; }
    .swal2-title { color: #818cf8 !important; }
    .swal2-select { background: #1e293b !important; color: white !important; border-radius: 0.75rem !important; height: 3rem !important; }
    .swal2-confirm { background: #6366f1 !important; border-radius: 0.75rem !important; }
  </style>
</head>
<body class="p-4 md:p-12 flex justify-center">

  <div class="main-wrapper w-full flex flex-col items-center">
    <header class="mb-10 w-full max-w-[1200px] flex items-center justify-between">
      <div>
        <h1 class="text-4xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-500">
          aiBanlist <span class="text-indigo-500">ELITE</span>
          <span id="app-version-display" class="ml-2 text-[10px] text-slate-500 font-mono align-middle"></span>
        </h1>
        <p class="text-[10px] font-black text-slate-600 uppercase tracking-[0.4em] mt-1">Real-time Tactical Inference Engine</p>
      </div>

      
      <!-- User Info Area -->
      <div id="user-profile" class="hidden flex items-center gap-4">
        <div class="text-right">
          <p id="profile-name" class="text-sm font-bold text-white">—</p>
          <div id="admin-tag-container"></div>
        </div>
        <img id="profile-avatar" src="" class="w-10 h-10 rounded-full border border-white/10 shadow-lg" />
        <button id="btn-header-logout" class="p-2 text-slate-500 hover:text-white transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
        </button>
      </div>
    </header>

    <div id="login-section" class="glass p-12 rounded-[3rem] text-center w-full max-w-md shadow-2xl">
      <p class="text-slate-400 mb-8 text-sm">請進行專家級帳號驗證以啟動演算</p>
      <button id="btn-google-login" class="bg-white hover:bg-slate-100 text-slate-900 font-black py-4 px-8 rounded-2xl flex items-center gap-3 transition-all shadow-2xl shadow-white/10 active:scale-95">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" onerror="this.src='https://www.google.com/favicon.ico'" class="w-5 h-5" alt="Google">
        GOOGLE 帳號授權
      </button>
    </div>

    <!-- 主功能區 (一屏化佈局) -->
    <div id="main-feature-section" class="hidden dual-layout w-full">
      
      <!-- 右欄（在小螢幕時置頂優先顯示）：分析報告區 -->
      <div class="side-output order-1 md:order-2">
        <div id="predict-results" class="hidden h-full flex flex-col">
          <div class="flex items-center justify-between mb-6 px-4">
            <h3 class="text-xl font-bold text-indigo-400">當前演算報告</h3>
            <span id="precision-tag" class="text-[10px] bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full font-black uppercase">地圖原生排名</span>
          </div>

          <div id="results-list" class="space-y-4"></div>
          
          <!-- 空白佔位：預設狀態 -->
          <div id="results-placeholder" class="hidden flex-1 glass rounded-[2.5rem] flex items-center justify-center border-dashed border-slate-800">
            <p class="text-slate-600 font-bold uppercase tracking-widest text-xs">等待地圖數據中...</p>
          </div>
        </div>
      </div>

      <!-- 左欄：即時輸入區 -->
      <div class="side-input order-2 md:order-1">
        <div class="glass p-8 rounded-[2.5rem] shadow-2xl sticky top-8">
          <div class="menu-block">
            <label>1. 定位戰地地圖</label>
            <select id="predict-map" class="w-full"></select>
          </div>
          
          <div id="ban-container" class="space-y-4 opacity-50 pointer-events-none transition-all duration-500">
            <div class="menu-block">
              <div class="flex items-center justify-between mb-2">
                <label>求生者 BANS (共 3 位)</label>
                <span id="ban-count-tag" class="text-[10px] text-indigo-400 font-bold">0 / 3</span>
              </div>
              <div id="unified-ban-slots" class="unified-ban-slots">
                <div class="ban-slot empty" data-index="0"></div>
                <div class="ban-slot empty" data-index="1"></div>
                <div class="ban-slot empty" data-index="2"></div>
              </div>
            </div>
          </div>

          <!-- Character Picker Modal -->
          <div id="character-picker-modal" class="character-picker-modal">
            <div class="modal-content">
              <div class="flex items-center justify-between mb-8">
                <div>
                  <h2 class="text-3xl font-black text-white">選擇求生者 Ban 位</h2>
                  <p class="text-slate-500 text-sm mt-1 uppercase tracking-widest font-bold">最多選擇 3 位角色</p>
                </div>
                <button id="btn-close-picker" class="bg-white/10 hover:bg-white/20 text-white px-6 py-3 rounded-2xl font-bold transition-all">完成選取</button>
              </div>
              
              <div class="relative">
                <input type="text" id="char-search" class="search-input" placeholder="搜尋角色名稱..." autocomplete="off">
                <div class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-500">
                  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
              </div>

              <div id="character-grid" class="character-grid">
                <!-- 動態生成的角色卡片 -->
              </div>
            </div>
          </div>
          
          <div class="mt-8 pt-6 border-t border-white/5">
            <p class="text-[10px] text-slate-600 uppercase font-black tracking-widest text-center">自動感應推演中</p>
          </div>
        </div>
      </div>

    </div>
    
    <div id="status-msg" class="hidden fixed bottom-6 right-6 px-8 py-5 rounded-3xl glass text-sm font-bold shadow-2xl z-50"></div>
  </div>

  <script type="module" src="./js/script.js"></script>
</body>
</html>
